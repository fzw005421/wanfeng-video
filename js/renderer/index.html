<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' blob:;
    style-src 'self' 'unsafe-inline';
    img-src 'self' https: http: data: blob:;
    media-src 'self' https: http: blob:;
    connect-src https: http: blob:;
    worker-src 'self' blob:;
    child-src 'self' blob:;
    font-src 'self';
  ">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>晚风影视</title>
  <!-- hls.js 播放器引擎 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ==================== 顶部窗口控制栏 ==================== -->
  <div id="titlebar">
    <div class="titlebar-title">晚风影视</div>
    <div class="titlebar-controls">
      <button id="btn-minimize" title="最小化">&#8212;</button>
      <button id="btn-maximize" title="最大化">&#9744;</button>
      <button id="btn-close" title="关闭">&#10005;</button>
    </div>
  </div>

  <!-- ==================== 应用容器 ==================== -->
  <div id="app">
    <!-- 侧边栏 -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-text">晚风影视</div>
        <div class="sidebar-logo-sub">WANFENG VIDEO</div>
      </div>
      <div class="sidebar-nav">
        <button class="nav-item active" data-page="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          首页
        </button>
        <button class="nav-item" data-page="history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          播放记录
        </button>
        <button class="nav-item" data-page="favorites">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          我的收藏
        </button>
        <button class="nav-item" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          软件设置
        </button>
        <div style="height:1px;background:var(--border);margin:8px 14px;"></div>
        <button class="theme-toggle-btn" id="theme-toggle" title="切换明暗主题">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          切换主题
        </button>
      </div>
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebar-avatar"></div>
        <div class="sidebar-user-info">
          <span id="sidebar-nickname"></span>
        </div>
        <button id="btn-logout" class="btn-text btn-sm">退出</button>
      </div>
    </nav>

    <!-- 主内容区域 -->
    <main id="content">
      <!-- 各个页面动态渲染到这里 -->
    </main>
  </div>

  <!-- ==================== 全局弹窗容器 ==================== -->
  <div id="toast-container"></div>
  <div id="modal-overlay" class="hidden"></div>

  <!-- ==================== 脚本 ==================== -->
  <!-- hls.js HLS 播放引擎 -->
  <script src="vendor/hls.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components/vod-card.js"></script>
  <script src="js/components/player.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/detail.js"></script>
  <script src="js/pages/player.js"></script>
  <script src="js/pages/favorites.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
